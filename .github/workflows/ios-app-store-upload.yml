name: iOS App Store Archive Upload

on:
  workflow_dispatch:

jobs:
  archive-and-upload:
    name: Archive and upload to App Store Connect
    runs-on: macos-15

    env:
      APP_SCHEME: CVMatchTracker
      APP_PROJECT: CVMatchTracker.xcodeproj
      BUNDLE_ID: com.lanray07.cvmatchtracker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.APPLE_TEAM_ID }}"
          test -n "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}"
          test -n "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          test -n "${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}"

      - name: Install App Store Connect API key
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          API_KEY_DIR="$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$API_KEY_DIR/AuthKey_${API_KEY_ID}.p8"

          mkdir -p "$API_KEY_DIR"
          printf "%s" "$API_PRIVATE_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"

          if ! grep -q "BEGIN PRIVATE KEY" "$API_KEY_PATH"; then
            echo "::error::APP_STORE_CONNECT_API_PRIVATE_KEY must contain the full .p8 private key text, including BEGIN PRIVATE KEY and END PRIVATE KEY."
            exit 1
          fi

          echo "API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Archive signed app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project "$APP_PROJECT" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/CVMatchTracker.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            clean archive

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/CVMatchTracker.xcarchive" \
            -exportPath "$RUNNER_TEMP/app-store-export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Upload IPA to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/app-store-export" -name "*.ipa" -print -quit)
          test -n "$IPA_PATH"
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
