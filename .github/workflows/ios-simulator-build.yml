name: iOS Simulator Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "CVMatchTracker/**"
      - "CVMatchTracker.xcodeproj/**"
      - ".github/workflows/ios-simulator-build.yml"
  pull_request:
    paths:
      - "CVMatchTracker/**"
      - "CVMatchTracker.xcodeproj/**"
      - ".github/workflows/ios-simulator-build.yml"

jobs:
  build:
    name: Build on GitHub macOS
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve package dependencies
        run: |
          xcodebuild \
            -project CVMatchTracker.xcodeproj \
            -scheme CVMatchTracker \
            -resolvePackageDependencies

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project CVMatchTracker.xcodeproj \
            -scheme CVMatchTracker \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            clean build
